name: Otimizar Imagens para WebP

on:
  push:
    paths:
      - 'imagens/fotos_originais/**'
  workflow_dispatch:

jobs:
  otimizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install Pillow

      - name: Run image converter
        run: python tools/converter_fotos.py

      - name: Configure Git for commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push generated files
        run: |
          git add imagens/galeria data/timeline.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automático: Fotos otimizadas para WebP"
            git push
          fi