<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria | Mulheres na Computação MNC</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/paginas/galeria.css">

  <!-- Inicialização do tema para evitar Flash of Unstyled Content (FOUC) -->
  <script>
    (function () {
      const s = localStorage.getItem('mnc-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', s);
    })();
  </script>
</head>

<body>

  <!-- Overlay da animação de transição (PCB) -->
  <div id="circuitOverlay">
    <canvas id="circuitCanvas"></canvas>
  </div>

  <!-- Padrão de fundo global -->
  <div class="global-pattern"></div>

  <!-- O Header será injetado dinamicamente pelo script.js -->
  <header id="main-header"></header>

  <main>
<main>
    <section class="gallery-section">
      <div class="gallery-bg-shape-1"></div>
      <div class="gallery-bg-shape-2"></div>

      <div class="gallery-banner reveal">
        <span class="overline" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)">Memórias</span>
        <h2>Galeria do <span>Mulheres na Computação</span></h2>
        <p>Diga Xis! Vem pra galeria do MNC!<br>Dá uma olhada no que a gente anda aprontando ;D</p>
      </div>

      <div class="filtros-galeria reveal" id="container-filtros"></div>

      <div class="timeline-vertical" id="container-timeline">
        <p id="loading-galeria" style="color: var(--teal); text-align: center; font-family: inherit; font-size: 1.1rem; padding: 2rem 0;">Carregando memórias...</p>
      </div>

    </section>

    <footer id="main-footer" class="site-footer"></footer>
  </main>

  <!-- Importação centralizada de todos os scripts da página -->
  <script src="../js/script.js" defer></script>
</body>

</html>
