<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipe | Mulheres na Computação MNC</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/style.css">
  <!-- Inicialização do tema para evitar Flash of Unstyled Content (FOUC) -->
  <script>(function(){const s=localStorage.getItem('mnc-theme')||'dark';document.documentElement.setAttribute('data-theme',s);})();</script>
</head>
<body>
  <div id="circuitOverlay">
    <canvas id="circuitCanvas"></canvas>
  </div>

  <div class="global-pattern"></div>

  <!-- O Header será injetado dinamicamente pelo script.js -->
  <header id="main-header"></header>

  <main>
    <section class="team-section">
      <div class="team-bg-shape-1"></div>
      <div class="team-bg-shape-2"></div>

      <div class="team-container">
        <div class="team-info-fixed reveal">
          <span class="overline">Pessoas</span>
          <h2>Equipe do<br><span>Mulheres na Computação</span></h2>
          <p>Vem conhecer a galera que faz isso acontecer!</p>
          <div class="scroll-indicator">
            Role para ver todos
            <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="coord-chat-bubble">
            <img src="https://i.pravatar.cc/150?u=luciana" alt="Luciana" class="chat-avatar">
            <div class="chat-text">
              <p>Olá! Sou a <strong>Luciana</strong>, coordenadora do projeto. Vai fundo!</p>
            </div>
          </div>
        </div>

        <div class="team-grid-scroll">

            <img src="https://i.pravatar.cc/150?u=luciana" alt="Luciana">

            <a href="mailto:#" class="mail-icon" aria-label="E-mail">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </a>
          </div>
          
          <div class="team-member reveal reveal-delay-2">
            <img src="https://i.pravatar.cc/150?u=sinddy" alt="Sinddy">
            <h3>Sinddy</h3><p>xxxxxx</p>
            <a href="mailto:#" class="mail-icon" aria-label="E-mail">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </a>
          </div>
      
          <div class="team-member reveal reveal-delay-1">
            <img src="https://i.pravatar.cc/150?u=jasmine" alt="Jasmine">
            <h3>Jasmine</h3><p>xxxxxx</p>
            <a href="mailto:#" class="mail-icon" aria-label="E-mail">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </a>
          </div>

          <div class="team-member reveal reveal-delay-2">
            <img src="https://i.pravatar.cc/150?u=nally" alt="Nally">
            <h3>Sonally</h3><p>xxxxxxxxxx</p>
            <a href="mailto:#" class="mail-icon" aria-label="E-mail">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

        </div>

    <!-- O Footer será injetado dinamicamente pelo script.js -->

  <script src="../js/script.js" defer></script>
